<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Coder Life</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins;

background:linear-gradient(135deg,#ff6b95,#ffb3c6);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

}

.card{

background:white;

width:90%;

max-width:380px;

border-radius:25px;

padding:25px;

text-align:center;

box-shadow:0 10px 40px rgba(0,0,0,0.2);

animation:fade 1s;

}

@keyframes fade{

from{opacity:0;transform:translateY(40px)}

to{opacity:1}

}

img{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:4px solid #ff6b95;

margin-bottom:15px;

}

h1{

color:#e91e63;

font-size:22px;

margin-bottom:10px;

}

.message{

font-size:15px;

line-height:1.6;

color:#444;

margin-bottom:20px;

}

.heart{

font-size:35px;

animation:beat 1s infinite;

}

@keyframes beat{

50%{transform:scale(1.2)}

}

button{

border:none;

padding:12px 25px;

border-radius:40px;

font-size:16px;

margin:8px;

cursor:pointer;

}

.yes{

background:#e91e63;

color:white;

}

.no{

background:gray;

color:white;

position:relative;

}

.success{

display:none;

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

background:white;

padding:30px;

border-radius:20px;

text-align:center;

box-shadow:0 10px 50px rgba(0,0,0,0.3);

}

</style>

</head>

<body>


<div class="card">

<img src="https://iili.io/qF5jCv9.md.jpg">

<h1>Coder Life </h1>

<div class="heart">🧑‍💻</div>

<p class="message">

कोड की लाइनों में एक सपना छुपा है,<br>

छोटा सा आइडिया है पर दिल से बना है।<br>

अगर लगे इसमें थोड़ा भी दम है,<br>

सच बताना… क्या ये काम कमाल का है?
<br><br>

<strong>शायरी तो बेकार है क्या यह देखने में अच्छा है?</strong>

</p>


<button class="yes" onclick="yes()">हाँ कमाल है 😄</button>

<button class="no" id="no" onmouseover="move()">नहीं , बेकार है</button>

</div>


<div class="success" id="success">

<h2>Thanks Taniya</h2>

<p>

Welcome To Coder World<br>

Start Study Using Study AI

</p>

<p>Ajit Kumar</p>

</div>


<script>

function yes(){

document.getElementById("success").style.display="block";

}


function move(){

let btn=document.getElementById("no");

let x=Math.random()*200-100;

let y=Math.random()*200-100;

btn.style.transform=`translate(${x}px,${y}px)`;

}

</script>

</body>

</html>
